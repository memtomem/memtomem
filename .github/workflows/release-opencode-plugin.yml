name: Publish OpenCode plugin

on:
  push:
    tags:
      - "opencode-v[0-9]*"

jobs:
  preflight:
    name: OpenCode plugin release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/opencode-memtomem
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/opencode-memtomem/package-lock.json
      - name: Require tag version to match package
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test "${RELEASE_TAG#opencode-v}" = "$(node -p 'require("./package.json").version')"
      - name: Require the tag commit to be on main
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: npm ci
      - run: npm test
      - run: npm run pack:check

  publish:
    name: Publish opencode-memtomem to npm
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/opencode-memtomem
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/opencode-memtomem
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/opencode-memtomem/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Publish with npm trusted publishing
        run: npm publish --access public --provenance
