name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # schedule:
  #   - cron: "17 5 * * *"   # nightly — enable once LLM secrets are provisioned

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check packages/memtomem/src packages/memtomem/tests tools
      - run: uv run ruff format --check packages/memtomem/src packages/memtomem/tests tools

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: mypy (gradual)
        run: uv run mypy packages/memtomem/src
        continue-on-error: true

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Windows ships informational pending the test-portability triage tracked
    # in #634 (umbrella) — ubuntu + macOS are the gating cells today. Flip
    # this to `false` (or remove) once the Windows triage sub-issues close.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: >-
          uv run pytest
          --ignore=packages/memtomem/tests/test_golden_path.py
          -m "not ollama and not llm"
          --tb=short -q

  test-browser:
    name: browser (Playwright + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      # ``--with-deps`` pulls the headless-shell apt packages on Ubuntu so
      # chromium can launch from a clean runner; the install also seeds the
      # browser cache that ``_playwright_browser_available()`` probes.
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest packages/memtomem/tests/web -m browser --tb=short -q

  test-golden-path:
    name: golden-path (ONNX bge-m3)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Cache fastembed model (paraphrase-multilingual-MiniLM-L12-v2, ~220 MB)
        uses: actions/cache@v5
        with:
          path: ${{ env.FASTEMBED_CACHE_PATH }}
          key: ${{ runner.os }}-fastembed-multilingual-minilm-l12
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_golden_path.py --tb=short -q

  test-llm-nightly:
    name: llm-nightly (optional)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest -m "llm" --tb=short -q

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_notebooks.py --tb=short -q

  test-js:
    name: js-unit (vitest + jsdom)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/memtomem/tests-js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/memtomem/tests-js/package-lock.json
      - run: npm ci
      - run: npm test

  vendored-assets:
    name: vendored-assets (OSV advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      # The Web UI ships SHA-pinned browser libs (DOMPurify, marked, Prism,
      # Swagger UI) that live in no package.json, so `npm audit` never sees
      # them. This queries OSV for every npm package/version in
      # web/static/vendor/THIRD_PARTY_LICENSES.md and fails on any advisory.
      # (The SHA<->disk pin check runs offline in the `test` job.)
      - run: uv run python tools/check_vendored_advisories.py
