name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # schedule:
  #   - cron: "17 5 * * *"   # nightly — enable once LLM secrets are provisioned

# Single source of truth for the uv toolchain setup-uv installs. Pinning (vs
# "latest") keeps CI reproducible; Dependabot's github-actions updater can't
# touch a `with:` input, so bump this by hand — in lockstep with the same pin
# in release.yml.
env:
  UV_VERSION: "0.11.16"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      # Fail closed on pyproject <-> uv.lock drift (e.g. a Dependabot member-dep
      # update that edits the lock's requires-dist but not the member manifest).
      # dependabot.yml uses versioning-strategy: lockfile-only to prevent that at
      # the source; this is the CI backstop, since every other job resolves with
      # `uv sync --frozen` (which neither checks nor regenerates the lock).
      - run: uv lock --check
      - run: uv sync --frozen
      - run: uv run ruff check packages/memtomem/src packages/memtomem/tests tools
      - run: uv run ruff format --check packages/memtomem/src packages/memtomem/tests tools

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      - name: mypy (gradual)
        run: uv run mypy packages/memtomem/src
        continue-on-error: true

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      - run: >-
          uv run pytest
          --ignore=packages/memtomem/tests/test_golden_path.py
          -m "not ollama and not llm"
          --tb=short -q

  test-windows-shard:
    name: windows-test-shard (${{ matrix.shard }})
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      - run: >-
          uv run python tools/run_pytest_shard.py
          --shard-index ${{ matrix.shard }}
          --shard-count 2 --
          -m "not ollama and not llm"
          --tb=short -q

  test-windows:
    name: test (windows-latest)
    if: ${{ always() }}
    needs: [test-windows-shard]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require every Windows shard to succeed
        env:
          SHARD_RESULT: ${{ needs.test-windows-shard.result }}
        run: test "$SHARD_RESULT" = success

  test-browser:
    name: browser (Playwright + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      # ``--with-deps`` pulls the headless-shell apt packages on Ubuntu so
      # chromium can launch from a clean runner; the install also seeds the
      # browser cache that ``_playwright_browser_available()`` probes.
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest packages/memtomem/tests/web -m browser --tb=short -q

  test-golden-path:
    name: golden-path (ONNX bge-m3)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Cache fastembed model (paraphrase-multilingual-MiniLM-L12-v2, ~220 MB)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.FASTEMBED_CACHE_PATH }}
          key: ${{ runner.os }}-fastembed-multilingual-minilm-l12
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_golden_path.py --tb=short -q
      - name: Audit public synthetic retrieval corpus
        run: uv run python tools/retrieval-eval/audit_public_corpus.py
      - name: Check public retrieval quality floors
        env:
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "1"
        run: uv run python tools/retrieval-eval/check_baseline.py --runs 1

  test-llm-nightly:
    name: llm-nightly (optional)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      - run: uv run pytest -m "llm" --tb=short -q

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_notebooks.py --tb=short -q

  test-js:
    name: js-unit (vitest + jsdom)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/memtomem/tests-js
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/memtomem/tests-js/package-lock.json
      - run: npm ci
      - run: npm test

  test-opencode-plugin:
    name: OpenCode plugin (build + unit + pack)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/opencode-memtomem
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/opencode-memtomem/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run pack:check

  vendored-assets:
    name: vendored-assets (OSV blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen
      # The Web UI ships SHA-pinned browser libs (DOMPurify, marked, Prism,
      # Swagger UI) that live in no package.json, so `npm audit` never sees
      # them. This queries OSV for every npm package/version in
      # web/static/vendor/THIRD_PARTY_LICENSES.md and fails on any advisory.
      # (The SHA<->disk pin check runs offline in the `test` job.)
      - run: uv run python tools/check_vendored_advisories.py

  python-deps:
    name: python-deps (OSV blocking — Python + JavaScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Both shipped Python resolution metadata and the JavaScript lockfiles are
    # blocking. A reviewed exception must use the canonical owner/reason/
    # expiry schema; CI converts it to OSV Scanner's stricter native schema.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      # Hand-maintained pin: Dependabot sees no release-asset URL, so on a bump
      # update OSV_VERSION and the matching osv-scanner_linux_amd64 SHA-256 from
      # the release's osv-scanner_SHA256SUMS together.
      - name: Install osv-scanner (pinned + SHA-256 verified)
        env:
          OSV_VERSION: v2.3.8
          OSV_SHA256: bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      - name: Validate reviewed OSV exceptions
        run: >-
          uv run --no-project --python 3.12 python tools/check_osv_exceptions.py
          --output "$RUNNER_TEMP/osv-scanner.toml"
      # osv-scanner queries OSV.dev live, so the pinned binary never goes stale
      # on advisory data. Scan both lockfiles in one invocation so an exception
      # cannot accidentally make only one ecosystem blocking.
      - name: OSV scan (Python + JavaScript lockfiles — blocking)
        run: |
          set -o pipefail
          rc=0
          ./osv-scanner scan source \
            --config="$RUNNER_TEMP/osv-scanner.toml" \
            --lockfile=uv.lock \
            --lockfile=packages/memtomem/tests-js/package-lock.json \
            --lockfile=packages/opencode-memtomem/package-lock.json \
            --format markdown --verbosity error | tee -a "$GITHUB_STEP_SUMMARY" || rc=$?
          # rc 0 = clean, 1 = advisories found. Higher
          # means the scan itself errored (e.g. OSV.dev unreachable), so the
          # short/empty summary must NOT be read as "clean".
          if [ "$rc" -gt 1 ]; then
            echo "> :warning: osv-scanner exited ${rc} — the advisory scan may not have completed." >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$rc"

  bandit:
    name: bandit (security lint — blocking)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      # Bandit compares against a committed baseline and blocks only *new*
      # findings. Scoped to shipped source (src/). Regenerate the
      # baseline after an intentional change with:
      #   uvx bandit@1.9.4 -r packages/memtomem/src -f json -o tools/bandit-baseline.json
      # (A no-op regen only rewrites the generated_at timestamp — that diff is benign.)
      - name: bandit (new findings vs baseline — blocking)
        run: >-
          uvx bandit@1.9.4 -r packages/memtomem/src
          -b tools/bandit-baseline.json -q

  security-gates:
    name: security-gates
    if: ${{ always() }}
    needs: [test-js, test-opencode-plugin, vendored-assets, python-deps, bandit]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require every security dependency to succeed
        env:
          JS_RESULT: ${{ needs.test-js.result }}
          OPENCODE_RESULT: ${{ needs.test-opencode-plugin.result }}
          VENDORED_RESULT: ${{ needs.vendored-assets.result }}
          OSV_RESULT: ${{ needs.python-deps.result }}
          BANDIT_RESULT: ${{ needs.bandit.result }}
        run: |
          set -euo pipefail
          for result in "$JS_RESULT" "$OPENCODE_RESULT" "$VENDORED_RESULT" "$OSV_RESULT" "$BANDIT_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "security dependency did not succeed: $result" >&2
              exit 1
            fi
          done
