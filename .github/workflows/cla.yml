name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize]

# Explicit permissions — repository default may be read-only.
permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Check CLA signatures
        if: >-
          ${{
            github.event_name == 'pull_request_target' ||
            (
              github.event.issue.pull_request &&
              (
                github.event.comment.body == 'recheck' ||
                github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
              )
            )
          }}
        run: python3 .github/cla-check.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT used to push the signature JSON. The target branch
          # `cla-signatures` is unprotected, so no admin / bypass
          # permission is required — a plain repo-scoped token works.
          # See #87 for the prior history when signatures lived on `main`.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SIGNATURES_PATH: signatures/v1/cla.json
          SIGNATURES_BRANCH: cla-signatures
          CLA_DOCUMENT_URL: https://github.com/memtomem/memtomem/blob/main/CLA.md
          CLA_ALLOWLIST: dependabot[bot],memtomem
          CLA_SIGNATURE_TEXT: I have read the CLA Document and I hereby sign the CLA
